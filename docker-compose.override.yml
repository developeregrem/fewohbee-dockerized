# Local overrides – loaded automatically by `docker compose`.
# Add optional bind mounts here for local-only customization, e.g. database helper
# scripts or custom nginx config files for the `web` service.
# Portainer CE (git-based deploy) does not load this file.

services:
    db:
        volumes:
             - ./conf/db/create-backup-user.sh:/docker-entrypoint-initdb.d/create-backup-user.sh:ro
             - ./conf/db/backup_mysql_cron.sh:/db/backup_mysql_cron.sh:ro

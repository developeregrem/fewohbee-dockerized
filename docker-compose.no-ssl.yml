# Reverse-proxy mode: SSL is terminated by an external proxy (Traefik, Nginx, Caddy, etc.)
# The web container listens on plain HTTP on LISTEN_PORT (default: 80).
# No acme container — certificate management is handled by the external proxy.
#
# Usage: docker compose -f docker-compose.no-ssl.yml up -d

services:
    web:
        image: nginx:mainline-alpine
        ports:
            - ${LISTEN_PORT:-80}:80
        volumes:
            - feb-data:/var/www/html:cached
            - ./conf/nginx/:/etc/nginx/conf.d/
            - ./conf/nginx/site.conf.no-ssl:/etc/nginx/conf.d/site.conf:ro
        environment:
            - HOST_NAME=${HOST_NAME}
            - REVERSE_PROXY=true
        entrypoint: ["/bin/sh", "/etc/nginx/conf.d/docker-entrypoint.sh"]
        networks:
            - internal-network
        restart: always

    php:
        image: developeregrem/fewohbee-phpfpm:latest
        volumes:
            - feb-data:/var/www/html:cached
            - ./conf/php/conf.ini:/usr/local/etc/php/conf.d/conf.ini
            - ${WWW_ROOT}:/var/www/data:cached
        networks:
            - internal-network
        env_file:
            - .env.app
        environment:
            - TZ=${TZ}
            - DB_SERVER_VERSION=12.1.2-MariaDB
        restart: always

    cron:
        image: developeregrem/fewohbee-phpcli:latest
        volumes:
            - feb-data:/var/www/html:cached
            - ./conf/php/conf.ini:/usr/local/etc/php/conf.d/conf.ini
            - ./cron.d/cli:/opt/cron:ro
        networks:
            - internal-network
        env_file:
            - .env.app
        environment:
            - TZ=${TZ}
            - DB_SERVER_VERSION=12.1.2-MariaDB
        restart: always

    db:
        image: mariadb:12.1
        restart: always
        volumes:
             - db-vol:/var/lib/mysql:cached
             - ${MYSQL_BACKUP_FOLDER}:/dbbackup:cached
             - ./data/db:/db
             - ./conf/db/create-backup-user.sh:/docker-entrypoint-initdb.d/create-backup-user.sh:ro
        environment:
            MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
            MARIADB_USER: ${MARIADB_USER}
            MARIADB_PASSWORD: ${MARIADB_PASSWORD}
            MARIADB_DATABASE: ${MARIADB_DATABASE}
            MYSQL_BACKUP_PASSWORD: ${MYSQL_BACKUP_PASSWORD}
            MYSQL_BACKUP_USER: ${MYSQL_BACKUP_USER}
        networks:
            - internal-network

    redis:
        image: redis:alpine
        restart: always
        volumes:
             - redis-vol:/data/
        networks:
            - internal-network

networks:
    internal-network:
        driver: bridge

volumes:
    redis-vol:
    db-vol:
    feb-data:

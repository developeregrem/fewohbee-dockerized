# Reverse-proxy mode: SSL is terminated by an external proxy (Traefik, Nginx, Caddy, etc.)
# The web container listens on plain HTTP on LISTEN_PORT (default: 80).
# No acme container — certificate management is handled by the external proxy.
#
# Usage: docker compose -f docker-compose.no-ssl.yml up -d

services:
    web:
        build: ./conf/nginx
        ports:
            - ${LISTEN_PORT:-80}:80
        volumes:
            - feb-data:/var/www/html:cached
        environment:
            - HOST_NAME=${HOST_NAME}
            - REVERSE_PROXY=true
        networks:
            - internal-network
        restart: always

    php:
        image: developeregrem/fewohbee-phpfpm:latest
        volumes:
            - feb-data:/var/www/html:cached
            - ./conf/php/conf.ini:/usr/local/etc/php/conf.d/conf.ini
        networks:
            - internal-network
        environment:
            - TZ=${TZ}
            - DB_SERVER_VERSION=12.1.2-MariaDB
            - LOCALE=${LOCALE}
            - FEWOHBEE_VERSION=${FEWOHBEE_VERSION}
            - APP_ENV=${APP_ENV}
            - APP_SECRET=${APP_SECRET}
            - REDIS_IDX=${REDIS_IDX}
            - REDIS_HOST=${REDIS_HOST}
            - USE_PASSWORD_BLACKLIST=${USE_PASSWORD_BLACKLIST}
            - DATABASE_URL=${DATABASE_URL}
            - MAILER_DSN=${MAILER_DSN}
            - FROM_MAIL=${FROM_MAIL}
            - FROM_NAME=${FROM_NAME}
            - RETURN_PATH=${RETURN_PATH}
            - MAIL_COPY=${MAIL_COPY}
            - CUSTOMER_SALUTATIONS=${CUSTOMER_SALUTATIONS}
            - RELYING_PARTY_ID=${RELYING_PARTY_ID}
            - RELYING_PARTY_NAME=${RELYING_PARTY_NAME}
            - PASSKEY_ENABLED=${PASSKEY_ENABLED}
            - WEB_HOST=${WEB_HOST}
            - INVOICE_FILENAME_PATTERN=${INVOICE_FILENAME_PATTERN}
            - DEFAULT_URI=${DEFAULT_URI}
            # new-vars-marker
        restart: always

    cron:
        image: developeregrem/fewohbee-phpcli:latest
        volumes:
            - feb-data:/var/www/html:cached
            - ./conf/php/conf.ini:/usr/local/etc/php/conf.d/conf.ini
            - ./cron.d/cli:/opt/cron:ro
        networks:
            - internal-network
        environment:
            - TZ=${TZ}
            - DB_SERVER_VERSION=12.1.2-MariaDB
            - LOCALE=${LOCALE}
            - FEWOHBEE_VERSION=${FEWOHBEE_VERSION}
            - APP_ENV=${APP_ENV}
            - APP_SECRET=${APP_SECRET}
            - REDIS_IDX=${REDIS_IDX}
            - REDIS_HOST=${REDIS_HOST}
            - USE_PASSWORD_BLACKLIST=${USE_PASSWORD_BLACKLIST}
            - DATABASE_URL=${DATABASE_URL}
            - MAILER_DSN=${MAILER_DSN}
            - FROM_MAIL=${FROM_MAIL}
            - FROM_NAME=${FROM_NAME}
            - RETURN_PATH=${RETURN_PATH}
            - MAIL_COPY=${MAIL_COPY}
            - CUSTOMER_SALUTATIONS=${CUSTOMER_SALUTATIONS}
            - RELYING_PARTY_ID=${RELYING_PARTY_ID}
            - RELYING_PARTY_NAME=${RELYING_PARTY_NAME}
            - PASSKEY_ENABLED=${PASSKEY_ENABLED}
            - WEB_HOST=${WEB_HOST}
            - INVOICE_FILENAME_PATTERN=${INVOICE_FILENAME_PATTERN}
            - DEFAULT_URI=${DEFAULT_URI}
            # new-vars-marker
        restart: always

    db:
        image: mariadb:12.1
        restart: always
        volumes:
             - db-vol:/var/lib/mysql:cached
             - db-backup-vol:/dbbackup:cached
             - ./data/db:/db
             - ./conf/db/create-backup-user.sh:/docker-entrypoint-initdb.d/create-backup-user.sh:ro
        environment:
            MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
            MARIADB_USER: ${MARIADB_USER}
            MARIADB_PASSWORD: ${MARIADB_PASSWORD}
            MARIADB_DATABASE: ${MARIADB_DATABASE}
            MYSQL_BACKUP_PASSWORD: ${MYSQL_BACKUP_PASSWORD}
            MYSQL_BACKUP_USER: ${MYSQL_BACKUP_USER}
        networks:
            - internal-network

    redis:
        image: redis:alpine
        restart: always
        volumes:
             - redis-vol:/data/
        networks:
            - internal-network

networks:
    internal-network:
        driver: bridge

volumes:
    redis-vol:
    db-vol:
    feb-data:
    db-backup-vol:
